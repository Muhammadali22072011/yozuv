<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Yozuv Business — iPhone prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="stage">
    <div id="root"></div>
  </div>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/screens-home.jsx"></script>
  <script type="text/babel" src="components/screens-core.jsx"></script>
  <script type="text/babel" src="components/screens-more.jsx"></script>
  <script type="text/babel" src="components/sheets.jsx"></script>
  <script type="text/babel" src="components/screens-extra.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [screen, setScreen] = useState(() => {
        try { return localStorage.getItem('yz-screen') || 'home'; } catch { return 'home'; }
      });
      const [prevScreen, setPrevScreen] = useState(null);
      const [sheet, setSheet] = useState(null);
      const [toast, setToast] = useState(null);
      const [chatData, setChatData] = useState(null);

      useEffect(() => {
        try { localStorage.setItem('yz-screen', screen); } catch {}
      }, [screen]);

      useEffect(() => {
        window.__yzToast = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(null), 2200);
        };
      }, []);

      const go = (next, data) => {
        if (next === 'add') {
          setSheet({ kind: 'newBooking', data: null });
          return;
        }
        if (next === 'calendar') setScreen('calendar');
        else if (next === 'clients') setScreen('clients');
        else if (next === 'stats') setScreen('stats');
        else if (next === 'chatRoom') { setChatData(data); setScreen('chatRoom'); }
        else setScreen(next);
      };

      const openSheet = (s) => setSheet(s);
      const closeSheet = () => setSheet(null);

      // Determine active tab for tab bar
      const activeTab = ['home','calendar','clients','stats'].includes(screen) ? screen : 'home';

      const renderScreen = () => {
        switch (screen) {
          case 'home':        return <HomeScreen go={go} openSheet={openSheet}/>;
          case 'calendar':    return <CalendarScreen go={go} openSheet={openSheet}/>;
          case 'clients':     return <ClientsScreen go={go} openSheet={openSheet}/>;
          case 'stats':       return <AnalyticsScreen go={go}/>;
          case 'services':    return <ServicesScreen go={go} openSheet={openSheet}/>;
          case 'promo':       return <PromoScreen go={go}/>;
          case 'qr':          return <QrScreen go={go}/>;
          case 'reviews':     return <ReviewsScreen go={go}/>;
          case 'chat':        return <ChatListScreen go={go}/>;
          case 'chatRoom':    return <ChatRoomScreen go={go} chatData={chatData}/>;
          case 'notifications': return <NotificationsScreen go={go}/>;
          case 'settings':    return <SettingsScreen go={go}/>;
          case 'schedule':    return <ScheduleScreen go={go}/>;
          case 'profile':     return <ProfileScreen go={go}/>;
          default:            return <HomeScreen go={go} openSheet={openSheet}/>;
        }
      };

      // Hide tab bar on chatRoom + settings (full-screen)
      const hideTab = screen === 'chatRoom';

      return (
        <div className="device-wrap">
          <IOSDevice width={402} height={874}>
            <div style={{position:'absolute', inset:0, background:'#F8F9FC'}}>
              <div key={screen} className="screen screen-fade">
                {renderScreen()}
              </div>

              {!hideTab && <TabBar active={activeTab} onChange={go}/>}

              {toast && <div className="toast">{toast}</div>}

              {sheet && (
                <>
                  <div className="sheet-backdrop" onClick={closeSheet}/>
                  {sheet.kind === 'newBooking'  && <NewBookingSheet onClose={closeSheet} data={sheet.data}/>}
                  {sheet.kind === 'booking'     && <BookingSheet    onClose={closeSheet} data={sheet.data}/>}
                  {sheet.kind === 'client'      && <ClientSheet     onClose={closeSheet} data={sheet.data}/>}
                  {sheet.kind === 'service'     && <ServiceSheet    onClose={closeSheet} data={sheet.data}/>}
                </>
              )}
            </div>
          </IOSDevice>

          {/* Dev jump menu — quick navigation to hidden screens */}
          <div style={{
            position:'absolute', left:'calc(100% + 20px)', top:0,
            width:180, display:'flex', flexDirection:'column', gap:6,
            color:'#848AA2', fontSize:12, fontFamily:'Plus Jakarta Sans',
          }}>
            <div style={{fontSize:10, fontWeight:700, letterSpacing:0.6, textTransform:'uppercase', color:'rgba(255,255,255,0.4)', marginBottom:4}}>Ekranlar</div>
            {[
              ['home','Asosiy'],
              ['calendar','Jadval'],
              ['clients','Mijozlar'],
              ['stats','Analitika'],
              ['services','Xizmatlar'],
              ['promo','Promo'],
              ['qr','QR kod'],
              ['reviews','Baholar'],
              ['chat','Xabarlar'],
              ['notifications','Bildirishnomalar'],
              ['settings','Sozlamalar'],
              ['schedule','Ish jadvali'],
              ['profile','Profil'],
            ].map(([id, label]) => (
              <div key={id} onClick={() => go(id)} style={{
                padding:'8px 12px', borderRadius:10,
                background: screen === id ? 'rgba(72,83,245,0.25)' : 'rgba(255,255,255,0.04)',
                color: screen === id ? '#fff' : 'rgba(255,255,255,0.6)',
                fontWeight: screen === id ? 700 : 500,
                cursor:'pointer', userSelect:'none',
                border: `1px solid ${screen === id ? 'rgba(72,83,245,0.5)' : 'rgba(255,255,255,0.06)'}`,
              }}>{label}</div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
