# Railway config for the API service.
#
# IMPORTANT: in the Railway service settings, set
#   Root Directory = backend
# so this file and the Dockerfile are found, and build context = backend/.
#
# Telegram bot: DO NOT run a second service with `python -m bot.main`.
# That entrypoint is polling-mode for LOCAL DEVELOPMENT only and will
# raise TelegramConflictError if it runs alongside this API. In
# production the bot lives inside this same FastAPI process via webhook
# (see app/main.py lifespan) and registers itself at PUBLIC_API_URL
# /webhook with the WEBHOOK_SECRET shared header.
#
# For a Celery worker (optional, separate service):
#   celery -A app.celery_app worker --loglevel=info

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
