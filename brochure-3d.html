<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yozuv — 3D Broshyura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo-500:#5B6BFF;--indigo-600:#4853F5;--indigo-700:#3640D4;
    --ink-900:#0B0F1F;--ink-700:#2A2F45;--ink-500:#5A6078;--ink-400:#848AA2;
    --ink-200:#E3E5EC;--ink-100:#F2F3F7;--ink-50:#F8F9FC;
    --indigo-50:#EEF0FF;--indigo-100:#E0E4FF;--mint:#0E9577;--mint-bg:#E6FAF3;
    --warn:#A8751A;--warn-bg:#FFF3DA;--coral:#C93A2A;--coral-bg:#FFE7E3;
    --lemon:#FFC94A;
    --display:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  html,body{
    background:radial-gradient(1200px 600px at 50% -10%,#1a1f3a 0%,#0B0F1F 60%);
    min-height:100vh;font-family:var(--display);color:var(--ink-900);
  }
  body{display:flex;flex-direction:column;align-items:center;gap:26px;padding:40px 16px 64px}

  /* ───────── interactive 3D stage (screen only) ───────── */
  .stage{
    width:100%;max-width:780px;height:540px;
    perspective:2000px;perspective-origin:50% 42%;
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .tri{transform-style:preserve-3d;display:flex;transition:transform .18s linear;will-change:transform}
  .floor{position:absolute;left:50%;bottom:60px;width:560px;height:80px;transform:translateX(-50%);
    background:radial-gradient(ellipse at center,rgba(0,0,0,.45),transparent 70%);filter:blur(8px);z-index:-1}

  .panel{position:relative;width:232px;height:452px;flex:0 0 auto;overflow:hidden;backface-visibility:hidden}
  .panel.left{transform-origin:right center;transform:rotateY(var(--fa,46deg))}
  .panel.right{transform-origin:left center;transform:rotateY(calc(var(--fa,46deg) * -1))}
  .panel.center{transform:translateZ(.1px)}
  .panel::after{content:'';position:absolute;inset:0;pointer-events:none;transition:opacity .18s linear;opacity:0}
  .panel.left::after{background:linear-gradient(90deg,rgba(11,15,31,.42),transparent 60%);opacity:var(--sh,.4)}
  .panel.right::after{background:linear-gradient(270deg,rgba(11,15,31,.42),transparent 60%);opacity:var(--sh,.4)}
  .panel.left{border-right:1px solid rgba(11,15,31,.10)}
  .panel.right{border-left:1px solid rgba(11,15,31,.10)}

  .pad{padding:17px 16px;height:100%;display:flex;flex-direction:column;position:relative;z-index:1}
  .p-light{background:var(--ink-50)}
  .p-white{background:#fff}
  .p-hero,.p-indigo{background:linear-gradient(160deg,#5B6BFF 0%,#4853F5 55%,#3640D4 100%);color:#fff}
  .p-dark{background:linear-gradient(135deg,#0B0F1F 0%,#1E2270 100%);color:#fff}
  .blob{position:absolute;border-radius:50%;pointer-events:none}

  .logo{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
  .ymk{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#5B6BFF,#3640D4);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
    box-shadow:0 4px 11px rgba(72,83,245,.4);flex-shrink:0;letter-spacing:-.02em}
  .ymk.dark{background:var(--ink-900);box-shadow:none}
  .ymk.white{background:#fff;color:var(--indigo-600);box-shadow:0 4px 11px rgba(11,15,31,.18)}
  .lmeta .kk{font-size:8px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-400);line-height:1}
  .lmeta .nm{margin-top:2px;font-weight:800;font-size:14px;line-height:1;letter-spacing:-.02em;color:var(--ink-900)}
  .p-hero .kk,.p-indigo .kk,.p-dark .kk{color:rgba(255,255,255,.65)}
  .p-hero .nm,.p-indigo .nm,.p-dark .nm{color:#fff}

  .eye{font-size:8.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo-600)}
  .p-hero .eye,.p-indigo .eye,.p-dark .eye{color:rgba(255,255,255,.7)}
  .h-sec{font-weight:800;letter-spacing:-.025em;line-height:1.1;color:var(--ink-900);font-size:18px;margin-top:3px}
  .p-hero .h-sec,.p-dark .h-sec{color:#fff}

  .feats{margin-top:14px;display:flex;flex-direction:column;gap:7px;flex:1}
  .feat{background:#fff;border-radius:13px;padding:9px 10px;display:flex;align-items:center;gap:9px;
    box-shadow:0 1px 0 rgba(11,15,31,.04),0 5px 12px -7px rgba(11,15,31,.10)}
  .fico{flex-shrink:0;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px}
  .ic-i{background:var(--indigo-50);color:var(--indigo-600)}
  .ic-m{background:var(--mint-bg);color:var(--mint)}
  .ic-l{background:var(--warn-bg);color:var(--warn)}
  .ic-c{background:var(--coral-bg);color:var(--coral)}
  .ic-v{background:#F0EBFF;color:#6B4FE0}
  .ic-s{background:#E5F4FF;color:#2A7DC2}
  .fnm{font-size:12px;font-weight:800;color:var(--ink-900);letter-spacing:-.01em;line-height:1.15}
  .fds{margin-top:1px;font-size:9.5px;color:var(--ink-500);line-height:1.3;font-weight:500}

  .steps{margin-top:14px;display:flex;flex-direction:column;gap:11px;flex:1}
  .step{display:flex;gap:11px;align-items:flex-start}
  .snum{flex-shrink:0;width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#EEF0FF,#E0E4FF);
    color:var(--indigo-700);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .sh{font-size:13px;font-weight:800;color:var(--ink-900);letter-spacing:-.015em;line-height:1.1}
  .sp{margin-top:2px;font-size:10px;color:var(--ink-500);line-height:1.35;font-weight:500}

  .cover-h{margin-top:20px;position:relative;z-index:1}
  .cover-h h1{font-size:24px;line-height:1.08;color:#fff;letter-spacing:-.035em;font-weight:800}
  .cover-h p{margin-top:9px;font-size:11px;color:rgba(255,255,255,.85);line-height:1.5;font-weight:500}
  .qr-card{margin-top:16px;background:#fff;border-radius:16px;padding:14px;box-shadow:0 20px 46px -14px rgba(11,15,31,.5);
    display:flex;flex-direction:column;align-items:center;gap:9px;position:relative;z-index:1}
  .qr-card .qr{width:108px;height:108px}.qr-card .qr svg,.qr-card .qr img{width:100%;height:100%;display:block}
  .qcap{text-align:center}
  .qcap .t1{font-size:11px;color:var(--ink-900);font-weight:700;letter-spacing:-.01em}
  .qcap .t2{margin-top:2px;font-size:9.5px;color:var(--ink-500);font-family:ui-monospace,Menlo,monospace}
  .cover-ban{margin:auto -16px -17px;padding:11px 16px;background:rgba(255,255,255,.14);color:#fff;font-size:11px;
    font-weight:700;text-align:center;border-top:1px solid rgba(255,255,255,.14);position:relative;z-index:1}
  .cover-ban .lem{color:var(--lemon)}

  .price-num{margin-top:10px;font-weight:800;font-size:54px;line-height:1;color:#fff;letter-spacing:-.04em}
  .price-num .per{font-size:18px;font-weight:600;color:rgba(255,255,255,.7)}
  .price-note{margin-top:5px;font-size:11px;color:rgba(255,255,255,.8);font-weight:500}
  .perks{margin-top:18px;display:flex;flex-direction:column;gap:9px;flex:1}
  .perk{display:flex;align-items:center;gap:9px;font-size:11px;color:rgba(255,255,255,.92);font-weight:600}
  .pchk{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.16);color:var(--lemon);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
  .cta{margin-top:auto;background:#fff;border-radius:14px;padding:14px;text-align:center;
    box-shadow:0 16px 32px -14px rgba(11,15,31,.4);position:relative;z-index:1}
  .cta .cl{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--indigo-600)}
  .cta .lk{margin-top:5px;font-size:15px;font-weight:800;color:var(--ink-900);letter-spacing:-.02em}
  .pop{position:absolute;top:16px;right:16px;background:var(--lemon);color:var(--ink-900);font-size:9px;
    font-weight:800;letter-spacing:.1em;padding:4px 9px;border-radius:999px;z-index:3}

  .cats{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .cat{background:#fff;border-radius:11px;padding:9px;display:flex;align-items:center;gap:7px;font-size:11px;
    color:var(--ink-900);font-weight:700;box-shadow:0 3px 10px -6px rgba(11,15,31,.12)}
  .cico{width:22px;height:22px;border-radius:7px;background:var(--indigo-50);color:var(--indigo-600);
    display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .quote{margin-top:auto;background:#fff;border-radius:14px;padding:14px;border-left:3px solid var(--indigo-600);
    box-shadow:0 6px 18px -9px rgba(11,15,31,.12)}
  .qstars{color:var(--lemon);font-size:12px;letter-spacing:1px}
  .quote p{margin-top:5px;font-size:12px;line-height:1.4;color:var(--ink-900);font-weight:600}
  .quote f{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:9.5px;color:var(--ink-500);font-weight:600}
  .qav{width:19px;height:19px;border-radius:50%;background:linear-gradient(135deg,#FFC94A,#FF7A6B);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px}

  .clist{margin-top:16px;display:flex;flex-direction:column;gap:11px}
  .crow{display:flex;align-items:center;gap:10px;font-size:12px;color:#fff;font-weight:600}
  .cic{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.10);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;font-size:13px}
  .mini-qr{margin-top:auto;display:flex;gap:11px;align-items:center;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:11px}
  .mini-qr .qr{width:64px;height:64px;background:#fff;border-radius:8px;padding:5px;flex-shrink:0}
  .mini-qr .qr svg{width:100%;height:100%;display:block}
  .mqt{font-size:10px;color:rgba(255,255,255,.85);line-height:1.4;font-weight:500}
  .mqt b{color:#fff;font-weight:800}
  .foot{margin-top:16px;display:flex;justify-content:space-between;align-items:center;padding-top:11px;
    border-top:1px solid rgba(255,255,255,.10)}
  .foot small{font-size:9px;color:rgba(255,255,255,.45);font-weight:500}

  /* ───────── controls ───────── */
  .controls{display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:center;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:16px 22px;backdrop-filter:blur(8px)}
  .ctl{display:flex;flex-direction:column;gap:6px;align-items:center}
  .ctl label{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .ctl input[type=range]{width:150px;accent-color:var(--indigo-500);cursor:pointer}
  .btn{background:var(--indigo-600);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:13px;
    font-weight:700;cursor:pointer;letter-spacing:-.01em;box-shadow:0 10px 24px -10px rgba(72,83,245,.7);
    font-family:inherit;transition:transform .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn.light{background:#fff;color:var(--ink-900)}
  .hint{color:rgba(255,255,255,.4);font-size:11px;font-weight:500;text-align:center}

  /* ───────── print — flatten to two flat A4 trifold sheets ───────── */
  .print-only{display:none}
  @media print{
    @page{size:A4 landscape;margin:0}
    html,body{background:#fff;padding:0;margin:0;display:block}
    .stage,.controls,.hint,.floor{display:none !important}
    .print-only{display:block}
    .sheet{width:297mm;height:210mm;display:grid;grid-template-columns:repeat(3,99mm);page-break-after:always;overflow:hidden}
    .sheet:last-child{page-break-after:auto}
    .sheet .panel{width:99mm;height:210mm;transform:none !important;border:none !important;box-shadow:none}
    .sheet .panel::after{display:none}
    .sheet .pad{padding:11mm}
  }
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="tri" id="tri"></div>
    <div class="floor"></div>
  </div>

  <div class="controls">
    <div class="ctl"><label>Burama</label><input id="fold" type="range" min="0" max="100" value="42"></div>
    <div class="ctl"><label>Koʻrinish</label><input id="spin" type="range" min="-45" max="45" value="-16"></div>
    <button id="flip" class="btn">↻ Orqa tomon</button>
    <button id="print" class="btn light">🖨 Chop etish</button>
  </div>
  <div class="hint">Burab koʻ­ring · aylantiring · orqa tomonni oching · A4 landscape qilib chop eting</div>

  <!-- print fallback: two flat sheets -->
  <div class="print-only">
    <div class="sheet" id="sheetFront"></div>
    <div class="sheet" id="sheetBack"></div>
  </div>

<script>
(function(){
  var tri=document.getElementById('tri'),fold=document.getElementById('fold'),
      spin=document.getElementById('spin'),flip=document.getElementById('flip'),
      printBtn=document.getElementById('print'),stage=document.getElementById('stage');
  var back=false,flipping=false;

  function qr(seed,size){
    size=size||29;var g=[],i,x,y;
    for(i=0;i<size;i++)g.push(new Array(size).fill(0));
    var s=2166136261>>>0;for(i=0;i<seed.length;i++){s^=seed.charCodeAt(i);s=Math.imul(s,16777619)>>>0;}
    function r(){s^=s<<13;s>>>=0;s^=s>>>17;s^=s<<5;s>>>=0;return (s>>>0)/4294967295;}
    for(y=0;y<size;y++)for(x=0;x<size;x++)g[y][x]=r()>0.5?1:0;
    function fnd(cx,cy){for(y=-1;y<=7;y++)for(x=-1;x<=7;x++){var gx=cx+x,gy=cy+y;
      if(gx<0||gy<0||gx>=size||gy>=size)continue;
      if(x===-1||y===-1||x===7||y===7){g[gy][gx]=0;continue;}
      var v=0;if(x===0||x===6||y===0||y===6)v=1;else if(x>=2&&x<=4&&y>=2&&y<=4)v=1;g[gy][gx]=v;}}
    fnd(0,0);fnd(size-7,0);fnd(0,size-7);
    for(i=8;i<size-8;i++){g[6][i]=i%2===0?1:0;g[i][6]=i%2===0?1:0;}
    var cell=100/size,rects='';
    for(y=0;y<size;y++){var rs=-1;for(x=0;x<=size;x++){var v=x<size?g[y][x]:0;
      if(v&&rs<0)rs=x;if((!v||x===size)&&rs>=0){rects+='<rect x="'+(rs*cell).toFixed(2)+'" y="'+(y*cell).toFixed(2)+'" width="'+((x-rs)*cell).toFixed(2)+'" height="'+cell.toFixed(2)+'"/>';rs=-1;}}}
    return '<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" shape-rendering="crispEdges"><rect width="100" height="100" fill="#fff"/><g fill="#0B0F1F">'+rects+'</g></svg>';
  }

  var FRONT=[
    '<div class="pad p-light"><div class="logo"><span class="ymk">Y</span><div class="lmeta"><div class="kk">Telegram Mini App</div><div class="nm">Yozuv</div></div></div>'+
    '<div style="margin-top:16px"><div class="eye">Imkoniyatlar</div><div class="h-sec">Biznesingiz uchun barcha vositalar</div></div>'+
    '<div class="feats">'+
    '<div class="feat"><span class="fico ic-i">📅</span><div><div class="fnm">Aqlli yozilish</div><div class="fds">Mijoz xizmat va vaqt tanlaydi</div></div></div>'+
    '<div class="feat"><span class="fico ic-m">🔔</span><div><div class="fnm">Tasdiqlash / Rad etish</div><div class="fds">Bir tugma bilan boshqarish</div></div></div>'+
    '<div class="feat"><span class="fico ic-l">💳</span><div><div class="fnm">Payme / Click toʻlov</div><div class="fds">Toʻgʻridan-toʻgʻri Telegramda</div></div></div>'+
    '<div class="feat"><span class="fico ic-s">📊</span><div><div class="fnm">Analitika</div><div class="fds">Daromad va statistika</div></div></div>'+
    '<div class="feat"><span class="fico ic-v">📄</span><div><div class="fnm">QR-broshyura</div><div class="fds">Avtomatik PDF va QR-kod</div></div></div>'+
    '<div class="feat"><span class="fico ic-c">🌐</span><div><div class="fnm">Katalog</div><div class="fds">Mijozlar sizni topadi</div></div></div>'+
    '</div></div>',

    '<div class="pad p-white"><div class="logo"><span class="ymk dark">Y</span><div class="lmeta"><div class="kk">4 Qadam</div><div class="nm">Qanday ishlaydi</div></div></div>'+
    '<div style="margin-top:16px"><div class="eye">Boshlash oson</div><div class="h-sec">Toʻrt qadamda ishga tushirish</div></div>'+
    '<div class="steps">'+
    '<div class="step"><div class="snum">01</div><div><div class="sh">Roʻyxatdan oʻting</div><div class="sp">Biznes nomi, kategoriya va xizmatlarni kiriting.</div></div></div>'+
    '<div class="step"><div class="snum">02</div><div><div class="sh">Havola va QR oling</div><div class="sp">Tizim botingizni avtomatik yaratadi.</div></div></div>'+
    '<div class="step"><div class="snum">03</div><div><div class="sh">Chop eting</div><div class="sp">Broshyurani doʻkoningizga ilib qoʻying.</div></div></div>'+
    '<div class="step"><div class="snum">04</div><div><div class="sh">Tayyor!</div><div class="sp">Mijozlar oʻzlari yoziladi.</div></div></div>'+
    '</div></div>',

    '<div class="pad p-hero"><div class="blob" style="width:190px;height:190px;right:-60px;top:-50px;background:rgba(255,255,255,.10)"></div>'+
    '<div class="blob" style="width:90px;height:90px;right:60px;top:60px;background:rgba(255,201,74,.30);filter:blur(3px)"></div>'+
    '<div class="logo"><span class="ymk white">Y</span><div class="lmeta"><div class="kk">Telegram Mini App</div><div class="nm">Yozuv</div></div></div>'+
    '<div class="cover-h"><h1>Mijozlar Telegram orqali yoziladi</h1><p>Sartarosh, salon, klinika va boshqa xizmatlar — slotlar, eslatmalar va analitika bitta platformada.</p></div>'+
    '<div class="qr-card"><div class="qr">'+qr('https://t.me/Yozuv_cl_bot',29)+'</div><div class="qcap"><div class="t1">Yozilish uchun skaner qiling</div><div class="t2">t.me/Yozuv_cl_bot</div></div></div>'+
    '<div class="cover-ban"><span class="lem">★</span> 14 kun bepul · Karta talab qilinmaydi</div></div>'
  ];

  var BACK=[
    '<div class="pad p-indigo"><div class="pop">MASHHUR</div>'+
    '<div class="blob" style="width:190px;height:190px;right:-60px;top:-60px;background:rgba(255,255,255,.10)"></div>'+
    '<div class="logo"><span class="ymk white">Y</span><div class="lmeta"><div class="kk">Tarif</div><div class="nm">Oylik reja</div></div></div>'+
    '<div style="margin-top:18px"><div class="plan" style="font-size:15px;font-weight:800;color:#fff">Pro</div><div class="price-num">$15<span class="per"> / oy</span></div><div class="price-note">187 500 soʻm · barcha imkoniyatlar cheksiz</div></div>'+
    '<div class="perks">'+
    '<div class="perk"><span class="pchk">✓</span>Cheksiz yozilishlar</div>'+
    '<div class="perk"><span class="pchk">✓</span>Payme / Click toʻlov</div>'+
    '<div class="perk"><span class="pchk">✓</span>Analitika va eslatmalar</div>'+
    '<div class="perk"><span class="pchk">✓</span>QR va PDF broshyura</div>'+
    '<div class="perk"><span class="pchk">✓</span>Mijozlar bazasi</div>'+
    '<div class="perk"><span class="pchk">✓</span>Premium qoʻllab-quvvatlash</div>'+
    '</div>'+
    '<div class="cta"><div class="cl">14 kun bepul sinab koʻring</div><div class="lk">yozuv.uz →</div></div></div>',

    '<div class="pad p-light"><div class="logo"><span class="ymk dark">Y</span><div class="lmeta"><div class="kk">Kim uchun</div><div class="nm">Kichik biznes</div></div></div>'+
    '<div style="margin-top:16px"><div class="eye">Kategoriyalar</div><div class="h-sec">Qaysi bizneslar uchun?</div></div>'+
    '<div class="cats">'+
    '<div class="cat"><span class="cico">💇</span>Sartarosh</div><div class="cat"><span class="cico">💆</span>Massaj / Spa</div>'+
    '<div class="cat"><span class="cico">🦷</span>Stomatolog</div><div class="cat"><span class="cico">📚</span>Repetitor</div>'+
    '<div class="cat"><span class="cico">📸</span>Fotograf</div><div class="cat"><span class="cico">🏋</span>Fitnes</div>'+
    '<div class="cat"><span class="cico">⚕️</span>Shifokor</div><div class="cat"><span class="cico">📦</span>Boshqalar</div>'+
    '</div>'+
    '<div class="quote"><div class="qstars">★★★★★</div><p>"Har kuni 5–10 ta yozilish avtomatik keladi. Endi hech qaysi mijozni unutmaymiz."</p><f><span class="qav">A</span>Akbar · Barber Akbar egasi</f></div></div>',

    '<div class="pad p-dark"><div class="blob" style="width:190px;height:190px;right:-60px;top:-60px;background:rgba(255,255,255,.10);filter:blur(20px)"></div>'+
    '<div class="logo"><span class="ymk white">Y</span><div class="lmeta"><div class="kk">Bogʻlanish</div><div class="nm">Yozuv jamoasi</div></div></div>'+
    '<div style="margin-top:16px;position:relative;z-index:1"><div class="eye">Kontakt</div><div class="h-sec">Savollar bormi?</div></div>'+

  ];

  function build(set){
    tri.innerHTML='';var cls=['left','center','right'];
    for(var i=0;i<3;i++){var p=document.createElement('div');p.className='panel '+cls[i];p.innerHTML=set[i];tri.appendChild(p);}
  }
  function apply(){
    var t=fold.value/100,ang=(t*72).toFixed(2)+'deg',sh=(0.08+t*0.5).toFixed(3);
    tri.style.setProperty('--fa',ang);
    tri.querySelectorAll('.panel').forEach(function(p){p.style.setProperty('--sh',sh);});
    var ry=(+spin.value)+(back?180:0);
    tri.style.transform='rotateX(7deg) rotateY('+ry+'deg)';
  }
  build(FRONT);apply();
  fold.addEventListener('input',apply);spin.addEventListener('input',apply);
  flip.addEventListener('click',function(){
    if(flipping)return;flipping=true;back=!back;flip.textContent=back?'↻ Old tomon':'↻ Orqa tomon';
    var endRy=(+spin.value)+(back?180:360);
    tri.style.transition='transform .5s cubic-bezier(.4,0,.2,1)';
    tri.style.transform='rotateX(7deg) rotateY('+endRy+'deg)';
    setTimeout(function(){build(back?BACK:FRONT);},250);
    setTimeout(function(){tri.style.transition='transform .18s linear';apply();flipping=false;},520);
  });

  // build flat print sheets once
  (function(){
    var sf=document.getElementById('sheetFront'),sb=document.getElementById('sheetBack');
    [FRONT,BACK].forEach(function(set,si){
      var host=si===0?sf:sb;
      set.forEach(function(html){var p=document.createElement('div');p.className='panel';p.innerHTML=html;host.appendChild(p);});
    });
  })();
  printBtn.addEventListener('click',function(){window.print();});

  // idle float
  var idle=0;
  setInterval(function(){if(flipping)return;idle+=0.02;stage.style.perspectiveOrigin=(50+Math.sin(idle)*2.2)+'% 42%';},40);
})();
</script>
