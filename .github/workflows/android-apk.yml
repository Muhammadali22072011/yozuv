name: Build Android APK

# Builds an installable Android APK from the Capacitor shell that loads
# the deployed Yozuv web app. No local Android Studio needed — the APK is
# produced in the cloud and attached as a downloadable artifact.
#
# Required repo setting (Settings → Secrets and variables → Actions → Variables):
#   CAP_SERVER_URL = https://<your-frontend-domain>   (the Mini App URL)
# Without it the APK builds but shows only the loading shell.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "frontend/capacitor.config.ts"
      - "frontend/android/**"
      - "frontend/mobile-shell/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS deps
        run: npm ci

      - name: Sync Capacitor (bakes the server URL into the app)
        env:
          CAP_SERVER_URL: ${{ vars.CAP_SERVER_URL }}
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: frontend/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yozuv-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
