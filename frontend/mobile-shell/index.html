<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Yozuv</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #4853f5;
        color: #fff;
        font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 24px;
      }
      .logo { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
      .msg { font-size: 14px; opacity: 0.85; max-width: 280px; line-height: 1.5; }
      .spinner {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Yozuv</div>
      <div class="spinner"></div>
      <div class="msg">Ulanmoqda… Internet aloqasini tekshiring.</div>
    </div>
  </body>
</html>
